name: Build & Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/zeacl/soma

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Docker build
        run: docker build -t ${{ env.IMAGE }}:latest .
      - name: Docker push
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ${{ env.IMAGE }}:latest
      - name: Make public
        run: |
          gh api /orgs/ZeaCl/packages/container/${{ env.IMAGE_NAME }}/visibility \
            -X PATCH -f visibility=public || true
